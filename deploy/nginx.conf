# Nginx 基础配置
# 说明：这份配置按“两项目同机部署 + Docker 服务名反代”整理。
# 如果你的 Nginx 是装在宿主机而不是容器里，把 upstream 改成宿主机端口。

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;

    # 允许前端跨域访问 API。当前前端未开启 credentials，所以这里可直接用通配符。
    map $request_method $cors_preflight {
        default 0;
        OPTIONS 1;
    }

    # ===================== 项目1：cenzen.asia （农业项目，farmer-backend） =====================
    server {
        listen 80;
        server_name 122.152.208.182 cenzen.asia www.cenzen.asia;
        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl;
        listen [::]:443 ssl;
        server_name 122.152.208.182 cenzen.asia www.cenzen.asia;

        ssl_certificate /usr/share/nginx/ssl/asia/cenzen.asia_bundle.crt;
        ssl_certificate_key /usr/share/nginx/ssl/asia/cenzen.asia.key;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5:!RC4:!DES:!3DES:!SHA1:!SHA256;
        ssl_prefer_server_ciphers on;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;
        ssl_session_tickets off;
        ssl_stapling on;
        ssl_stapling_verify on;
        resolver 8.8.8.8 114.114.114.114 valid=300s;
        resolver_timeout 5s;

        root /usr/share/nginx/farmer/dist;
        index index.html;

        location / {
            try_files $uri $uri/ /index.html;
            add_header Cache-Control "no-cache";
        }

        location ^~ /assets/ {
            expires 7d;
            add_header Cache-Control "public, max-age=604800";
            add_header ETag "";
            gzip off;
            autoindex off;
        }

        location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|webp|woff|woff2|ttf|otf)$ {
            expires 7d;
            add_header Cache-Control "public, max-age=604800";
            add_header ETag "";
            gzip off;
        }

        location ^~ /api/ {
            add_header Access-Control-Allow-Origin * always;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, PATCH, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Content-Type, Authorization, satoken, X-Requested-With, Accept, Origin" always;
            add_header Access-Control-Expose-Headers "satoken" always;
            add_header Access-Control-Max-Age 3600 always;
            add_header Vary Origin always;

            if ($cors_preflight) {
                return 204;
            }

            proxy_pass http://farmer-backend:8080;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            client_max_body_size 2G;
            client_body_timeout 1800s;
            proxy_connect_timeout 60s;
            proxy_send_timeout 1800s;
            proxy_read_timeout 1800s;
            proxy_request_buffering off;
            proxy_buffering off;
            proxy_buffer_size 16k;
            proxy_buffers 4 64k;
        }

        location ^~ /api/ws {
            add_header Access-Control-Allow-Origin * always;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, PATCH, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Content-Type, Authorization, satoken, X-Requested-With, Accept, Origin" always;
            add_header Access-Control-Expose-Headers "satoken" always;
            add_header Vary Origin always;

            proxy_pass http://farmer-backend:8080;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 3600s;
        }

        error_page 404 /index.html;
        error_page 500 502 503 504 /50x.html;

        location = /50x.html {
            root /usr/share/nginx/farmer/dist;
        }

        location ~ /\. {
            deny all;
            access_log off;
            log_not_found off;
        }

        access_log /var/log/nginx/cenzen_asia_access.log;
        error_log /var/log/nginx/cenzen_asia_error.log;
    }

    # ===================== 项目2：cenzen.cloud （视频项目，proj2-backend） =====================
    server {
        listen 80;
        server_name cenzen.cloud www.cenzen.cloud;
        return 301 https://cenzen.cloud$request_uri;
    }

    server {
        listen 443 ssl;
        listen [::]:443 ssl;
        server_name cenzen.cloud www.cenzen.cloud;

        ssl_certificate /usr/share/nginx/ssl/cloud/cenzen.cloud_bundle.pem;
        ssl_certificate_key /usr/share/nginx/ssl/cloud/cenzen.cloud.key;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5:!RC4:!DES:!3DES:!SHA1:!SHA256;
        ssl_prefer_server_ciphers on;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;

        if ($host = www.cenzen.cloud) {
            return 301 https://cenzen.cloud$request_uri;
        }

        root /usr/share/nginx/html;
        index index.html;

        location / {
            try_files $uri $uri/ /index.html;
            add_header Cache-Control "no-cache";
        }

        location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|webp|mp4|avi|mov|woff|woff2|ttf|otf)$ {
            expires 7d;
            add_header Cache-Control "public, max-age=604800";
            add_header ETag "";
            gzip off;
        }

        location ^~ /api/ {
            add_header Access-Control-Allow-Origin * always;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, PATCH, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Content-Type, Authorization, satoken, X-Requested-With, Accept, Origin" always;
            add_header Access-Control-Expose-Headers "satoken" always;
            add_header Access-Control-Max-Age 3600 always;
            add_header Vary Origin always;

            if ($cors_preflight) {
                return 204;
            }

            proxy_pass http://proj2-backend:8080;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            client_max_body_size 10G;
            client_body_timeout 1800s;
            proxy_connect_timeout 1800s;
            proxy_read_timeout 1800s;
            proxy_send_timeout 1800s;
            proxy_request_buffering off;
            proxy_buffering off;
        }

        location = /ai {
            return 301 /ai/;
        }

        location /ai/ {
            proxy_pass http://python-api:5000/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location ~ /\. {
            deny all;
            access_log off;
            log_not_found off;
        }

        error_page 404 /index.html;

        access_log /var/log/nginx/cenzen_cloud_access.log;
        error_log /var/log/nginx/cenzen_cloud_error.log;
    }
}
